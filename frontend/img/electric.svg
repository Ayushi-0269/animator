<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#0f172a"/>
  <!-- Field Lines -->
  <g stroke="#3b82f6" stroke-width="3" opacity="0.5">
    <line x1="300" y1="200" x2="300" y2="20"/>
    <line x1="300" y1="200" x2="300" y2="380"/>
    <line x1="300" y1="200" x2="120" y2="200"/>
    <line x1="300" y1="200" x2="480" y2="200"/>
    
    <line x1="300" y1="200" x2="170" y2="70"/>
    <line x1="300" y1="200" x2="430" y2="70"/>
    <line x1="300" y1="200" x2="170" y2="330"/>
    <line x1="300" y1="200" x2="430" y2="330"/>
  </g>
  <!-- Force Arrows -->
  <g fill="#3b82f6">
    <polygon points="295,30 305,30 300,15"/>
    <polygon points="295,370 305,370 300,385"/>
    <polygon points="130,195 130,205 115,200"/>
    <polygon points="470,195 470,205 485,200"/>
  </g>
  <!-- Charge Body -->
  <circle cx="300" cy="200" r="35" fill="#ef4444"/>
  <!-- Positive Sign -->
  <line x1="285" y1="200" x2="315" y2="200" stroke="#fff" stroke-width="6"/>
  <line x1="300" y1="185" x2="300" y2="215" stroke="#fff" stroke-width="6"/>
</svg>
