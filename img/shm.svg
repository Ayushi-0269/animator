<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#f1f5f9"/>
  <!-- Grid -->
  <path d="M0 100h600M0 200h600M0 300h600M300 0v400" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Pivot -->
  <rect x="250" y="20" width="100" height="10" fill="#475569"/>
  <!-- String -->
  <line x1="300" y1="30" x2="400" y2="300" stroke="#64748b" stroke-width="4"/>
  <line x1="300" y1="30" x2="200" y2="300" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6"/>
  <!-- Motion Arc -->
  <path d="M 200 300 A 280 280 0 0 0 400 300" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="5 5"/>
  <!-- Bob -->
  <circle cx="400" cy="300" r="25" fill="#3b82f6"/>
</svg>
