<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="none"/>
  <!-- Student Body -->
  <circle cx="300" cy="150" r="50" fill="#f87171"/> <!-- Head -->
  <rect x="230" y="210" width="140" height="180" fill="#3b82f6" rx="20"/> <!-- Torso -->
  <!-- Legs -->
  <rect x="250" y="380" width="35" height="140" fill="#1e293b"/>
  <rect x="315" y="380" width="35" height="140" fill="#1e293b"/>
  <!-- Laptop/Desk -->
  <rect x="150" y="320" width="280" height="20" fill="#94a3b8" rx="8"/> <!-- Table -->
  <polygon points="200,320 280,200 320,200 280,320" fill="#e2e8f0"/> <!-- Laptop screen -->
  <rect x="200" y="310" width="100" height="10" fill="#cbd5e1"/> <!-- Keyboard -->
  <!-- Arms -->
  <line x1="240" y1="250" x2="180" y2="300" stroke="#fcd34d" stroke-width="18" stroke-linecap="round"/>
  <!-- Floating Books -->
  <rect x="420" y="280" width="80" height="20" fill="#10b981" rx="4" transform="rotate(-15 420 280)"/>
  <rect x="430" y="250" width="80" height="20" fill="#f59e0b" rx="4" transform="rotate(-5 430 250)"/>
  <rect x="420" y="220" width="80" height="20" fill="#ec4899" rx="4" transform="rotate(10 420 220)"/>
</svg>
