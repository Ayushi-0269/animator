<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="none"/>
  <!-- Blackboard -->
  <rect x="50" y="50" width="500" height="350" fill="#334155" rx="10"/>
  <rect x="40" y="390" width="520" height="20" fill="#94a3b8" rx="5"/>
  <!-- Equations on board -->
  <text x="100" y="150" font-family="monospace" font-size="45" font-weight="bold" fill="#cbd5e1">E = mc²</text>
  <text x="100" y="240" font-family="monospace" font-size="45" font-weight="bold" fill="#cbd5e1">F = ma</text>
  <text x="100" y="330" font-family="monospace" font-size="40" fill="#cbd5e1">v = u + at</text>
  <!-- Atom drawing on board -->
  <ellipse cx="400" cy="200" rx="30" ry="80" fill="none" stroke="#cbd5e1" stroke-width="4" transform="rotate(30 400 200)"/>
  <ellipse cx="400" cy="200" rx="30" ry="80" fill="none" stroke="#cbd5e1" stroke-width="4" transform="rotate(-30 400 200)"/>
  <ellipse cx="400" cy="200" rx="30" ry="80" fill="none" stroke="#cbd5e1" stroke-width="4" transform="rotate(90 400 200)"/>
  
  <!-- Teacher Character -->
  <circle cx="650" cy="180" r="50" fill="#fbbf24"/> <!-- Head -->
  <rect x="600" y="230" width="100" height="150" fill="#0284c7" rx="20"/> <!-- Body -->
  <line x1="600" y1="260" x2="520" y2="300" stroke="#f59e0b" stroke-width="20" stroke-linecap="round"/> <!-- Left Arm (pointing to board) -->
  <line x1="700" y1="260" x2="720" y2="350" stroke="#f59e0b" stroke-width="20" stroke-linecap="round"/> <!-- Right Arm -->
  <!-- Pointer -->
  <line x1="520" y1="300" x2="350" y2="300" stroke="#f87171" stroke-width="6"/> 
  <!-- Legs -->
  <rect x="610" y="380" width="30" height="220" fill="#1e293b"/>
  <rect x="660" y="380" width="30" height="220" fill="#1e293b"/>
  <!-- Shoes -->
  <rect x="590" y="580" width="40" height="20" fill="#0f172a" rx="5"/>
  <rect x="660" y="580" width="40" height="20" fill="#0f172a" rx="5"/>
</svg>
