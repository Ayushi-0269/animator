<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="none"/>
  <!-- Scientist Head/Hair -->
  <circle cx="300" cy="150" r="50" fill="#fcd34d"/> <!-- Head -->
  <path d="M 250 150 C 250 80, 350 80, 350 150" fill="#1e293b"/> <!-- Hair -->
  <!-- Glasses -->
  <circle cx="280" cy="145" r="15" fill="none" stroke="#000" stroke-width="4"/>
  <circle cx="320" cy="145" r="15" fill="none" stroke="#000" stroke-width="4"/>
  <line x1="295" y1="145" x2="305" y2="145" stroke="#000" stroke-width="4"/>
  <!-- Lab Coat -->
  <path d="M 230 210 L 370 210 L 400 450 L 200 450 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="8"/>
  <line x1="300" y1="210" x2="300" y2="450" stroke="#cbd5e1" stroke-width="4"/> <!-- Buttons line -->
  <!-- Arm holding flask -->
  <line x1="360" y1="250" x2="450" y2="200" stroke="#fcd34d" stroke-width="18" stroke-linecap="round"/>
  <!-- Flask -->
  <polygon points="440,140 460,140 460,170 420,220 480,220" fill="#14b8a6"/>
  <polygon points="440,140 460,140 460,170 420,220 480,220" fill="none" stroke="#cbd5e1" stroke-width="6" stroke-linejoin="round"/>
</svg>
