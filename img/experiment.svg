<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="none"/>
  <!-- Table -->
  <rect x="50" y="350" width="500" height="30" fill="#475569" rx="10"/>
  <!-- Microscope -->
  <path d="M 180 350 C 180 280, 120 150, 180 150" fill="none" stroke="#64748b" stroke-width="30"/>
  <rect x="150" y="130" width="60" height="40" fill="#cbd5e1" rx="5"/>
  <rect x="130" y="320" width="100" height="30" fill="#334155" rx="5"/>
  <circle cx="180" cy="240" r="15" fill="#f8fafc"/>
  <!-- Erlenmeyer Flask -->
  <polygon points="330,150 350,150 350,200 300,350 380,350" fill="#60a5fa" opacity="0.8"/>
  <polygon points="330,150 350,150 350,200 300,350 380,350" fill="none" stroke="#cbd5e1" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="340" cy="300" r="12" fill="#fff" opacity="0.6"/>
  <circle cx="320" cy="320" r="8" fill="#fff" opacity="0.6"/>
  <!-- Magnet -->
  <path d="M 450,250 C 450,150 550,150 550,250 L 550,350 L 500,350 L 500,250 C 500,200 480,200 480,250 L 480,350 L 450,350 Z" fill="#ef4444"/>
  <!-- Magnet Poles -->
  <rect x="450" y="300" width="30" height="50" fill="#e2e8f0"/>
  <rect x="500" y="300" width="50" height="50" fill="#e2e8f0"/>
</svg>
